        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #028090;

        .avatar-btn { width: 36px; height: 36px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; text-decoration: none; font-size: 0.9rem; }

        .tender-title-row { display: flex; align-items: flex-start; gap: 0.75rem; flex-wrap: wrap; }
        .status-badge { background: var(--success); color: white; font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.6rem; border-radius: 10px; white-space: nowrap; flex-shrink: 0; margin-top: 0.2rem; }
        .tender-info-row { display: flex; gap: 0.5rem; font-size: 0.8rem; color: rgba(255,255,255,0.65); flex-wrap: wrap; margin-top: 0.4rem; }
        .countdown-num { font-size: 2rem; font-weight: 900; color: var(--accent); text-align: center; line-height: 1; }

        .bids-stat:last-child { border-left: none; }

        .bids-stat-lbl { font-size: 0.72rem; color: var(--gray); }

        /* Main content */
        .bids-main { max-width: 900px; margin: 0 auto; padding: 1.25rem 5% 3rem; }

        /* Toolbar */

        .sort-select { border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 0.5rem 0.875rem; font-family: 'Tajawal', sans-serif; font-size: 0.85rem; outline: none; color: var(--dark); background: white; }

        html.dark .rejected-overlay { border-color: #334155; }
        html.dark .empty-bids { background: #1e293b; }
        html.dark .notes-label { color: #e2e8f0; }
    </style>
</head>

<!-- Main content (Alpine.js) -->
<div class="bids-main" x-data="{
    tab: 'all',
    sortBy: 'date',
    expandedBid: null,
    bids: BIDS,
    get filteredBids() {
        let list = this.tab === 'all' ? this.bids
            : this.tab === 'shortlisted' ? this.bids.filter(b => b.status === 'shortlisted')
            : this.bids.filter(b => b.status === 'accepted');
        if (this.sortBy === 'price_low') return [...list].sort((a,b) => a.price - b.price);
        if (this.sortBy === 'price_high') return [...list].sort((a,b) => b.price - a.price);
        if (this.sortBy === 'rating') return [...list].sort((a,b) => b.rating - a.rating);
        return list;
    },
    shortlistBid(id) {
        const bid = this.bids.find(b => b.id === id);
        if (bid) bid.status = bid.status === 'shortlisted' ? 'pending' : 'shortlisted';
        updateShortlistedCount(this.bids);
    },
    async acceptBid(id) {
        // First, un-accept any previously accepted bid
        this.bids.forEach(b => {
            if (b.status === 'accepted') b.status = 'pending';
        });
        // Now accept this bid and reject others
        this.bids.forEach(b => {
            if (b.id === id) b.status = 'accepted';
            else if (b.status === 'pending' || b.status === 'shortlisted') b.status = 'rejected';
        });
        updateShortlistedCount(this.bids);
        showToast('🎉 تم قبول العرض! جارٍ الانتقال إلى دفعات المراحل...');
        const _tid = new URLSearchParams(location.search).get('tenderId') || TENDER.id;
        API.tenders.award(_tid, id).catch(() => {});
        setTimeout(() => { window.location.href = 'milestone-payments.html?tenderId=' + _tid; }, 1800);
    },
    rejectBid(id) {
        const bid = this.bids.find(b => b.id === id);
        if (bid) { bid.status = 'rejected'; this.expandedBid = null; }
        updateShortlistedCount(this.bids);
        showToast('تم رفض العرض');
    }
}">

    <!-- Toolbar: tabs + sort -->
    <div class="bids-toolbar">
        <div class="bids-tabs">
            <button class="bid-tab" :class="{active: tab==='all'}" @click="tab='all'">
                الكل <span class="bid-tab-count" x-text="bids.length"></span>
            </button>
            <button class="bid-tab" :class="{active: tab==='shortlisted'}" @click="tab='shortlisted'">
                مختصرة <span class="bid-tab-count" x-text="bids.filter(b=>b.status==='shortlisted').length"></span>
            </button>
            <button class="bid-tab" :class="{active: tab==='accepted'}" @click="tab='accepted'">
                مقبولة <span class="bid-tab-count" x-text="bids.filter(b=>b.status==='accepted').length"></span>
            </button>
        </div>
        <select class="sort-select" x-model="sortBy">
            <option value="date">الأحدث</option>
            <option value="price_low">السعر: الأقل</option>
            <option value="price_high">السعر: الأعلى</option>
            <option value="rating">التقييم</option>
        </select>
    </div>

    <!-- Price range insight (client-only) -->
    <div class="price-insight">
        <span class="price-insight-label">نطاق الأسعار المقدمة:</span>
        <span class="price-insight-range">440,000 — 570,000 ر.س</span>
        <span class="price-insight-avg">متوسط: 502,000 ر.س</span>
    </div>

    <!-- Bid cards list -->
    <div class="bids-list">
        <template x-for="bid in filteredBids" :key="bid.id">
            <div class="bid-card" :class="{ shortlisted: bid.status==='shortlisted', accepted: bid.status==='accepted', rejected: bid.status==='rejected' }">

                <!-- Bid card header -->
                <div class="bid-card-header">
                    <div class="bid-company">
                        <div class="company-avatar" :style="`background:linear-gradient(135deg,${bid.avatarColor.split(',')[0]},${bid.avatarColor.split(',')[1]})`" x-text="bid.avatar"></div>
                        <div class="company-info">
                            <div class="company-name-row">
                                <span class="company-name" x-text="bid.company"></span>
                                <span class="verified-badge" x-show="bid.verified">✓ موثق</span>
                            </div>
                            <div class="company-meta">
                                <span x-text="'⭐ ' + bid.rating"></span>
                                <span x-text="'(' + bid.reviewCount + ' تقييم)'"></span>
                                <span x-text="'· ' + bid.yearsExp + ' سنة خبرة'"></span>
                            </div>
                        </div>
                    </div>
                    <div class="bid-price-col">
                        <div class="bid-price" x-text="bid.price.toLocaleString('ar-SA') + ' ر.س'"></div>
                        <div class="bid-duration" x-text="bid.duration"></div>
                    </div>
                </div>

                <!-- Status badge -->
                <div class="bid-status-row">
                    <span class="bid-status-badge pending" x-show="bid.status==='pending'">قيد المراجعة</span>
                    <span class="bid-status-badge shortlisted-badge" x-show="bid.status==='shortlisted'">⭐ مختصر</span>
                    <span class="bid-status-badge accepted-badge" x-show="bid.status==='accepted'">✅ مقبول</span>
                    <span class="bid-status-badge rejected-badge" x-show="bid.status==='rejected'">مرفوض</span>
                    <span class="bid-submitted-at" x-text="bid.submittedAt"></span>
                    <span class="bid-attachment" x-show="bid.attachmentName">📎 <span x-text="bid.attachmentName"></span></span>
                </div>

                <!-- Proposal summary -->
                <p class="bid-proposal" x-text="bid.proposalSummary"></p>

                <!-- Price breakdown (expandable) -->
                <div class="bid-breakdown" x-show="expandedBid === bid.id">
                    <div class="breakdown-title">تفصيل السعر</div>
                    <div class="breakdown-row">
                        <span>العمالة</span>
                        <span x-text="bid.breakdown.labor.toLocaleString('ar-SA') + ' ر.س'"></span>
                    </div>
                    <div class="breakdown-row">
                        <span>المواد</span>
                        <span x-text="bid.breakdown.materials.toLocaleString('ar-SA') + ' ر.س'"></span>
                    </div>
                    <div class="breakdown-row">
                        <span>المعدات</span>
                        <span x-text="bid.breakdown.equipment.toLocaleString('ar-SA') + ' ر.س'"></span>
                    </div>
                    <div class="breakdown-row total-row">
                        <span>الإجمالي</span>
                        <span x-text="bid.price.toLocaleString('ar-SA') + ' ر.س'"></span>
                    </div>
                    <div class="extra-info-row" x-show="bid.teamSize">
                        <span>حجم الفريق: <strong x-text="bid.teamSize + ' شخص'"></strong></span>
                        <span>موعد البدء: <strong x-text="bid.startAvailability"></strong></span>
                    </div>
                    <div class="bid-notes" x-show="bid.notes">
                        <span class="notes-label">ملاحظات المزود:</span>
                        <span x-text="bid.notes"></span>
                    </div>
                </div>

                <!-- Action buttons -->
                <div class="bid-actions" x-show="bid.status !== 'rejected'">
                    <button class="btn-expand" @click="expandedBid = expandedBid === bid.id ? null : bid.id">
                        <span x-text="expandedBid === bid.id ? '▲ إخفاء التفاصيل' : '▼ عرض التفاصيل'"></span>
                    </button>
                    <div class="bid-action-btns">
                        <a :href="'chat.html?type=tender&requestId=' + (new URLSearchParams(location.search).get('tenderId') || 'T001') + '&id=' + bid.id" class="btn-chat-bid">💬 تواصل</a>
                        <button class="btn-shortlist"
                            :class="{ active: bid.status === 'shortlisted' }"
                            @click="shortlistBid(bid.id)"
                            x-show="bid.status !== 'accepted'"
                            x-text="bid.status === 'shortlisted' ? '★ مختصر' : '☆ اختصار'">
                        </button>
                        <button class="btn-accept" @click="acceptBid(bid.id)" x-show="bid.status !== 'accepted'">
                            ✓ قبول
                        </button>
                        <span class="awarded-label" x-show="bid.status === 'accepted'">🏆 الفائز</span>
                    </div>
                </div>

                <!-- Rejected state -->
                <div class="rejected-overlay" x-show="bid.status === 'rejected'">
                    <span>تم الرفض</span>
                    <button @click="bid.status='pending'" style="background:none;border:none;color:var(--primary);font-family:'Tajawal',sans-serif;font-size:0.8rem;cursor:pointer;text-decoration:underline">تراجع</button>
                </div>
            </div>
        </template>

        <!-- Empty state -->
        <div class="empty-bids" x-show="filteredBids.length === 0">
            <div style="font-size:2.5rem;margin-bottom:0.75rem">📭</div>
            <p>لا توجد عروض في هذه الفئة بعد</p>
        </div>
    </div>

    <!-- Award tender action (shown when a bid is accepted) -->
    <div class="award-section" x-show="bids.some(b => b.status === 'accepted')">
        <div class="award-card">
            <div style="font-size:2rem;margin-bottom:0.5rem">🏆</div>
            <h3>تم اختيار الفائز</h3>
            <p>قم بإغلاق المناقصة وإبلاغ جميع المتقدمين</p>
            <button class="btn-close-tender" onclick="showToast('✅ تم إغلاق المناقصة وإبلاغ جميع المزودين')">إغلاق المناقصة ✓</button>
        </div>
    </div>

</div>

<!-- Alpine.js -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<script>
function updateShortlistedCount(bids) {
    const el = document.getElementById('shortlistedCount');
    if (el) el.textContent = bids.filter(b => b.status === 'shortlisted').length;
}

function initPage() {
    // Read tenderId from URL (passed from tender-create, tender-detail, tender-bids award)
    const _tndId = new URLSearchParams(location.search).get('tenderId');
    if (_tndId) {
        const tidEl = document.getElementById('tenderId');
        if (tidEl) tidEl.textContent = _tndId;
    }
    document.getElementById('tenderTitle').textContent = TENDER.title;
    if (!_tndId) document.getElementById('tenderId').textContent = TENDER.id;
    document.getElementById('tenderCity').textContent = '📍 ' + TENDER.city;
    document.getElementById('tenderBudgetDisplay').textContent = '💰 ' + TENDER.budget;
    document.getElementById('tenderStatus').textContent = TENDER.status === 'open' ? 'مفتوحة' : 'مغلقة';
    document.getElementById('daysLeft').textContent = TENDER.daysLeft;
    document.getElementById('totalBids').textContent = TENDER.bidCount;
    updateShortlistedCount(BIDS);
    document.getElementById('viewCount').textContent = TENDER.viewCount;
}

function showToast(msg) {
    let t = document.getElementById('pageToast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('khedmah_theme', isDark ? 'dark' : 'light');
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = isDark ? '☀️' : '🌙';
}

(function() {
    if (localStorage.getItem('khedmah_theme') === 'dark') {
        document.documentElement.classList.add('dark');
        const btn = document.getElementById('themeToggle');
        if (btn) btn.textContent = '☀️';
    }
    initPage();
})();
</script>

</body>
</html>
