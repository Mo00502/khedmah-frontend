<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--k-dark) 0%, var(--k-dark-2) 50%, var(--k-primary-dk) 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem; font-family: 'Tajawal', sans-serif;
    }
    .num-404 {
      font-size: clamp(6rem, 18vw, 10rem);

      background: linear-gradient(135deg, var(--k-accent), var(--k-secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
    .float-icon { animation: float 3s ease-in-out infinite; font-size: 5rem; margin-bottom: 1.5rem; }
    .quick-links { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-top: 2rem; }
    .quick-link { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); border-radius: 50px; padding: 0.5rem 1.25rem; font-size: 0.88rem; text-decoration: none; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; }
    .quick-link:hover { background: rgba(2,195,154,0.2); border-color: var(--k-accent); color: #fff; }
  </style>
</head>

  <div class="float-icon">🔍</div>

    <a href="customer/home-services.html" class="quick-link"><i class="fas fa-tools"></i> خدمات المنازل</a>
    <a href="auth/login.html" class="quick-link"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</a>
    <a href="shared/faq.html" class="quick-link"><i class="fas fa-question-circle"></i> المساعدة</a>

  <a href="index.html" class="btn btn-accent btn-lg px-5 mt-4" style="border-radius:14px;font-size:1rem">
    <i class="fas fa-arrow-right ms-2"></i> العودة للرئيسية
  </a>

  <p style="color:rgba(255,255,255,0.35);font-size:0.8rem;margin-top:3rem">
