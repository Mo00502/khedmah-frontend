<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تقييم الخدمة — خدمة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/khedmah.css">
  <style> body { background: #f8fafc; } </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
</head>
<body>
<script>
  /* ── Auth guard ── */
  (function() {
    if (localStorage.getItem('khedmah_demo')) return;
    var hasSession = Object.keys(localStorage).some(function(k) {
      return k.indexOf('auth-token') !== -1 || k.indexOf('supabase') !== -1;
    });
    if (!hasSession) { window.location.replace('../auth/login.html'); }
  })();
</script>


<nav class="k-navbar navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="../index.html">خدم<span style="color:var(--k-accent)">ة</span></a>
    <ul class="navbar-nav ms-auto">
      <li><a class="nav-link" href="dashboard.html" style="color:rgba(255,255,255,0.75)">لوحة التحكم</a></li>
    </ul>
  </div>
</nav>

<!-- Warning Banner -->
<div style="background:linear-gradient(135deg,#fef3c7,#fde68a);border-bottom:2px solid #f59e0b;padding:0.75rem 1rem;text-align:center">
  <i class="fas fa-exclamation-triangle" style="color:#d97706"></i>
  <strong style="color:#92400e;font-size:0.92rem"> يجب تقديم التقييم قبل تقديم طلب خدمة جديد</strong>
</div>

<div class="container py-4" style="max-width:560px" x-data="rateApp()">

  <!-- Success State -->
  <div x-show="submitted" style="text-align:center;padding:3rem 2rem">
    <div style="width:100px;height:100px;background:linear-gradient(135deg,var(--k-success),#059669);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;box-shadow:0 10px 30px rgba(16,185,129,0.4)">
      <i class="fas fa-check fa-3x" style="color:#fff"></i>
    </div>
    <h3 style="font-weight:900;color:var(--k-dark-2)">شكراً على تقييمك!</h3>
    <p style="color:var(--k-gray)">تقييمك يساعد المجتمع على اختيار أفضل مزودي الخدمة</p>
    <a href="dashboard.html" class="btn btn-primary mt-2">العودة للوحة التحكم</a>
  </div>

  <!-- Rating Form -->
  <div x-show="!submitted">
    <!-- Provider Card -->
    <div class="card border-0 shadow-sm mb-4" style="border-radius:20px;overflow:hidden">
      <div style="background:linear-gradient(135deg,var(--k-primary),var(--k-secondary));padding:2rem;text-align:center;color:#fff">
        <div style="width:80px;height:80px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:2.5rem">
          <i class="fas fa-user"></i>
        </div>
        <h4 style="font-weight:900;margin-bottom:0.25rem">أحمد السباك المحترف</h4>
        <div style="opacity:0.85;font-size:0.9rem">خدمة سباكة · 5 مارس 2026</div>
      </div>
      <div class="card-body p-4">

        <!-- Stars -->
        <div class="text-center mb-3">
          <label class="form-label fw-700 mb-3" style="font-size:1rem">تقييمك للخدمة</label>
          <div class="d-flex justify-content-center gap-2" style="margin-bottom:0.5rem">
            <template x-for="i in 5" :key="i">
              <button class="star-btn" :class="{ active: i <= (hover || rating) }"
                      @click="rating = i" @mouseenter="hover = i" @mouseleave="hover = 0">
                <i class="fas fa-star"></i>
              </button>
            </template>
          </div>
          <div style="font-size:1rem;font-weight:700;color:var(--k-primary);min-height:1.5rem" x-text="labels[hover||rating]"></div>
        </div>

        <!-- Comment -->
        <div class="mb-3">
          <label class="form-label fw-600">تعليق (اختياري)</label>
          <textarea class="form-control" rows="3" placeholder="شارك تجربتك مع هذا المزود..." x-model="comment" maxlength="300"></textarea>
          <div class="d-flex justify-content-end mt-1">
            <small style="color:var(--k-gray)" x-text="comment.length + '/300'"></small>
          </div>
        </div>

        <!-- Photo Upload -->
        <div class="mb-4">
          <label class="form-label fw-600">صور (اختياري، حتى 3 صور)</label>
          <div class="k-upload-zone" style="padding:1.5rem" onclick="document.getElementById('ratePhoto').click()">
            <i class="fas fa-camera fa-2x" style="color:#cbd5e0;margin-bottom:0.5rem"></i>
            <p style="margin:0;font-size:0.85rem;color:var(--k-gray)">إضافة صور</p>
            <input type="file" id="ratePhoto" multiple accept="image/*" style="display:none" onchange="previewRatePhotos(this)">
          </div>
          <div id="ratePhotoPreview" class="d-flex gap-2 mt-2 flex-wrap"></div>
        </div>

        <!-- Submit -->
        <button class="btn btn-primary w-100 py-3" :disabled="rating===0||loading" @click="submit()" style="border-radius:12px;font-size:1rem">
          <span x-show="!loading"><i class="fas fa-paper-plane ms-2"></i> إرسال التقييم</span>
          <span x-show="loading"><i class="fas fa-spinner fa-spin ms-2"></i> جاري الإرسال...</span>
        </button>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<script src="../assets/js/khedmah.js"></script>
<script>
  function rateApp() {
    return {
      rating: 0, hover: 0, comment: '', loading: false, submitted: false,
      labels: ['','ضعيف 😞','مقبول 😐','جيد 😊','ممتاز 😄','رائع جداً 🤩'],
      submit() {
        this.loading = true;
        setTimeout(() => { this.loading = false; this.submitted = true; }, 1500);
      }
    };
  }
  function previewRatePhotos(input) {
    const preview = document.getElementById('ratePhotoPreview');
    preview.innerHTML = '';
    Array.from(input.files).slice(0,3).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const div = document.createElement('div');
        div.style.cssText = 'width:72px;height:72px;border-radius:10px;overflow:hidden;border:2px solid var(--k-primary)';
        div.innerHTML = `<img src="${e.target.result}" alt="" style="width:100%;height:100%;object-fit:cover">`;
        preview.appendChild(div);
      };
      reader.readAsDataURL(file);
    });
  }
</script>
</body>
</html>
